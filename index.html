<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Animiation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #unity-container {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #unity-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #231F20;
        outline: none;
      }

      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: none;
      }

      #unity-progress-bar-empty {
        width: 200px;
        height: 18px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 9px;
        overflow: hidden;
      }

      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: #fff;
        transition: width 0.1s linear;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      var config = {
        arguments: [],
        dataUrl: "Build/The Software District Build.data.br",
        frameworkUrl: "Build/The Software District Build.framework.js.br",
        codeUrl: "Build/The Software District Build.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "The Software District",
        productName: "Animiation",
        productVersion: "0.1.0",
        matchWebGLToCanvasSize: true,
        devicePixelRatio: window.devicePixelRatio || 1,
      };

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = "Build/The Software District Build.loader.js";
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
