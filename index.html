<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Software District</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #unity-canvas {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        aspect-ratio: 16 / 9;
        width: min(100vw, calc(100vh * 16 / 9));
        background: #231F20;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" width=1280 height=720 tabindex="-1"></canvas>
    <script src="Build/The Software District Build.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/The Software District Build.data",
        frameworkUrl: "Build/The Software District Build.framework.js",
        codeUrl: "Build/The Software District Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "The Software District",
        productName: "Animiation",
        productVersion: "0.1.0",
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
